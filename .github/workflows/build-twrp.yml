name: Build TWRP j2corelte

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 4096
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync TWRP source
        run: |
          mkdir twrp
          cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0
          repo sync --current-branch --no-clone-bundle --no-tags --optimized-fetch --prune -j4

      - name: Clone device tree
        run: |
          cd twrp
          mkdir -p device/samsung
          git clone https://github.com/londonjoseph667-tech/android_device_samsung_j2corelte.git device/samsung/j2corelte

      - name: Build recovery
        run: |
          cd twrp
          source build/envsetup.sh
          lunch omni_j2corelte-eng
          mka recoveryimage -j2

      - name: Pack Odin tar
        run: |
          cd twrp/out/target/product/j2corelte
          tar -H ustar -c recovery.img > twrp_j2corelte_recovery.tar

      - name: Upload TWRP
        uses: actions/upload-artifact@v4
        with:
          name: twrp-j2corelte
          path: |
            twrp/out/target/product/j2corelte/recovery.img
            twrp/out/target/product/j2corelte/twrp_j2corelte_recovery.tar
